<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lab 1</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
      .content {
        display: flex;
      }
      .image-box__item {
        width: 100%;
        max-width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .image-box {
        margin: 0;
        width: 25%;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <article class="content">
        <figure class="image-box">
          <img
            class="image-box__item"
            src="img/im1.jpg"
            alt="Joseph Gonzalez"
          />
        </figure>
        <figure class="image-box">
          <img class="image-box__item" src="img/im2.jpg" alt="Eddie Dean" />
        </figure>
        <figure class="image-box">
          <img class="image-box__item" src="img/im3.jpg" alt="Karabo Mdluli" />
        </figure>
        <figure class="image-box">
          <img
            class="image-box__item"
            src="img/im4.jpg"
            alt="Jeffery Erhunse"
          />
        </figure>
      </article>
    </div>
  </body>
</html>
