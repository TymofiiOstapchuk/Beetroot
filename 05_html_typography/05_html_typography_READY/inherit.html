    <title>Розміри шрифтів</title>

    <style type="text/css">
      html {
        font-size: 16px;
      }
      .one {
        font-size: 1.5rem;
      }

        font-size: 2rem;
      }

      text in DIV with class="one" will be 54px

    </div>
