<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Nested Grig layout - example 2</title>

    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: #e2e2e2;
      }
      .grid {
        max-width: 800px;
        margin: 2rem auto;
        display: grid;
        grid-template-columns: 1fr 1fr 1fr 1fr;
        grid-auto-rows: minmax(100px, auto);
        gap: 10px;
        padding: 10px;
        background-color: rgba(201, 243, 116, 0.8);
      }

      .grid > div {
        background-color: #2b3745;
        padding: 10px;
      }
      .subgrid {
        grid-column: auto / span 3;
        display: grid;
        gap: 10px;
        grid-template-columns: 1fr 1fr;
      }
      .subgrid > div {
        background-color: #d51c9a;
      }
    </style>
  </head>

  <body>
    <div class="grid">
      <div class="child"></div>
      <div class="child"></div>
      <div class="child"></div>
      <div class="child"></div>
      <div class="child"></div>
      <div class="subgrid">
        <div class="child"></div>
        <div class="child"></div>
      </div>
    </div>
    <!--  /.container  -->
  </body>
</html>
