<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
      .red {
        color: red;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1 class="title" id="title">Hello JS</h1>
      <ul class="list" id="list">
        <li class="list_item">Bill</li>
      </ul>
    </div>

    <script>
      /* types => number, string, boolean, undefine, null, object,
        BigInt, Symbol 
      */

      const users = ["Bill", "Sam", "Pete", "Sarah"];

      let out = "";

      for (let i = 0; i < users.length; i++) {
        out += `<li>${users[i]}</li>`;
      }
      document.getElementById("list").innerHTML = out;
      console.log(out);
    </script>
  </body>
</html>
