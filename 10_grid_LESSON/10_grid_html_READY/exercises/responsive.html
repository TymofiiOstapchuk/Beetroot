<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Responsive layout</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
      .item::before {
        content: "";
        counter-increment: none;
      }

      .container {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
      }
      .header {
        grid-row: 1;
      }
      .left-sidebar {
        grid-row: 2;
      }

      @media (min-width: 768px) {
        .container {
          grid-template-columns: 1fr 1fr;
        }
        .header {
          grid-column: span 2;
        }
        .content {
          grid-row: 2;
          grid-column: 1;
        }
        .left-sidebar {
          grid-column: 1;
          grid-row: 3;
        }
        .right-sidebar {
          grid-column: 2;
          grid-row: 2;
        }
        .footer {
          grid-row: 3;
          grid-column: 2;
        }
      }

      @media (min-width: 992px) {
        .container {
          grid-template-columns: 1fr 2fr 1fr;
        }
        .header {
          grid-column: span 3;
        }

        .left-sidebar {
          grid-column: 1;
          grid-row: 2;
        }
        .content {
          grid-row: 2;
          grid-column: 2;
        }
        .right-sidebar {
          grid-column: 3;
          grid-row: 2;
        }
        .footer {
          grid-column: 1 / -1;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="content item item__green"><h1>Content</h1></div>
      <div class="header item item__blue item__blue_1"><h2>Header</h2></div>
      <div class="left-sidebar item item__purple"><h2>Left sidebar</h2></div>

      <div class="right-sidebar item item__violet">
        <h2>Right sidebar</h2>
      </div>
      <div class="footer item item__orange"><h2>Footer</h2></div>

      <!--
            <div class="item item__violet"></div>
            <div class="item item__wheat"></div>
            <div class="item item__gold"></div> 
    --></div>
    <!--  /.container  -->

    <script>
      const gridContainer = document.querySelector(".grid-container");
      function gridColumns() {
        console.log(getComputedStyle(gridContainer).gridTemplateColumns);
      }
      gridColumns();
    </script>
  </body>
</html>
