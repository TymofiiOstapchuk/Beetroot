<!DOCTYPE html>
<html>
  <head>
    <title>Margins collapsing</title>
    <meta charset="utf-8" />
    <style>
      body {
        font-size: 20px;
      }
      .wrap {
        max-width: 1000px;
        margin: 20px auto;
        background: #ffc;
        position: relative;
        padding: 1px 0;
      }
      p {
        margin: 60px 0;
        padding: 10px;
        background: #ccf;
      }
      span {
        display: block;
        width: 50px;
        height: 50px;
        border-radius: 50px;
        background: yellow;
        border: 2px dotted red;
        text-align: center;

        position: absolute;
        top: 50%;
        left: -25px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <p>First paragraph</p>
      <p>Second paragraph</p>
      <span>1</span>
    </div>
  </body>
</html>
