<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Border</title>
    <style>
      .box {
        width: 220px;
        height: 220px;
        margin: 50px auto 0;
        border-radius: 100%;
        border: 1px solid red;
      }
      .img-fluid {
        width: 100%;
        max-width: 100%;
        border-radius: 100%;
        height: 100%;
        object-fit: cover;
      }
    </style>
  </head>

  <body>
    <div class="box">
      <img class="img-fluid" src="img/im.jpg" />
    </div>
  </body>
</html>
