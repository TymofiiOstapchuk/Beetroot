<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>inline block</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
      .content-box {
        font-size: 20px;
        font-family: Arial, sans-serif;
      }

      .item-first {
        display: inline-block;
        width: 100px;
        height: 40px;
        background: yellow;
        padding: 50px;
        border: 10px solid red;
        margin: 30px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <p class="content-box">
        Lorem ipsum dolor <span class="item-first">sit amet</span>, consectetur
        adipisicing elit. Laborum eaque illo corrupti natus repudiandae possimus
        at amet cupiditate maxime voluptatibus velit, pariatur commodi
        aspernatur. Natus sed numquam sint hic commodi!
      </p>
    </div>
    <!-- /.container-->
  </body>
</html>
