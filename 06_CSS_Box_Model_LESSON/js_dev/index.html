<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .red {
        color: red;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1 class="title" id="title">Hello JS</h1>
    </div>

    <script>
      const title = document.getElementById("title");

      title.classList.add("red");

      console.log(title);
    </script>
  </body>
</html>
