<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <title>Address</title>
  </head>

  <body>
    <div class="container">
      <div class="address">
        <div class="address-left">
          <h2 class="address-left__title">
            kontact
            <span class="address-left__title-addresse">addresse</span>
          </h2>
          <h3 class="address-left__subtitle">Orbis Textil GmbH & Co. KG</h3>

          <div class="boxes-info">
            <div class="boxes-info__box boxes-info__box_address">
              <p class="box-address__content">Gewerbegebiet Oeckinghausen</p>
              <p class="box-address__content">
                Kruppstraße 20 | D-58553 Halver
              </p>
              <p class="box-address__content">Telefon: 02353-9132-0</p>
              <p class="box-address__content">Telefax: 02353-9132-44</p>
            </div>

            <div class="boxes-info__box boxes-info__box_email">
              <p class="box-address__content box-address__content_email">
                info@orbis-textil.de
              </p>
            </div>
            <div class="boxes-info__box boxes-info__box_clock">
              <p class="box-clock__content">
                Mo. bis Do. <span class="box-clock__time">08:00—17:00</span>
              </p>
              <p class="box-clock__content">
                Fr. <span class="box-clock__time">08:00—14:00</span>
              </p>
            </div>
          </div>
          <!--  /.boxes-info -->
        </div>
        <!--  /.address-left -->

        <div class="address-right">
          <img class="img-fluid" src="img/map.jpg" />
        </div>
      </div>
    </div>
  </body>
</html>
