<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Position</title>
    <meta charset="utf-8" />
    <style>
      body {
        font: bold 30px arial;
        color: white;
        margin: 0;
      }
      .block1 {
        width: 500px;
        height: 300px;
        background: teal;
      }
      .block2 {
        height: 150px;
        background: tan;
        position: absolute;
        right: 0;
        top: 0;
      }
      .header {
        max-inline-size: 1200px;
        margin-inline: auto;
        background: gray;
        position: relative;
      }
    </style>
  </head>
  <body>
    <header class="header">
      <div class="block1">Block 1</div>
      <div class="block2">Block 2</div>
      <div class="block1">Block 1</div>
    </header>
  </body>
</html>
