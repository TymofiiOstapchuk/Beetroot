<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Z-index</title>
    <meta charset="utf-8" />
    <style>
      div {
        height: 200px;
        width: 200px;
        text-align: right;
        position: absolute;
      }
      .d1 {
        background: #fcc;
        top: 100px;
        left: 100px;
        z-index: 1;
      }
      .d2 {
        background: #cfc;
        top: 140px;
        left: 140px;
      }
      .d3 {
        background: #ccf;
        top: 180px;
        left: 180px;
      }
    </style>
  </head>
  <body>
    <div class="d1">Block 1</div>
    <div class="d2">Block 2</div>
    <div class="d3">Block 3</div>
  </body>
</html>
