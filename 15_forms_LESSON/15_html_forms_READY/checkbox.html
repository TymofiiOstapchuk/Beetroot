<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Checkboxes</title>
    <link rel="stylesheet" href="css/checkbox.css" />
  </head>
  <body>
    <div class="container">
    <form class="form-box" autocomplete="off">
      <h2 class="form-box__title">checboxes</h2>

      <div class="form-fields">
        <label for="black">
          <input class="checkbox" type="radio" name="colors" id="black" />
          <span>black</span>
        </label>

        <label for="red">
          <input class="checkbox" type="radio" name="colors" id="red" />
          <span>red</span>
        </label>

        <label for="yellow">
          <input class="checkbox" type="radio" name="colors" id="yellow" />
          <span>yellow</span>
        </label>
      </div>

      <hr />

      <div class="form-fields">
        <label for="small">
          <input class="checkbox" type="checkbox" name="size" id="small" />
          <span class="checkbox__span">small</span>
        </label>

        <label for="medium">
          <input class="checkbox" type="checkbox" name="size" id="medium" />
          <span class="checkbox__span">medium</span>
        </label>

        <label for="large">
          <input class="checkbox" type="checkbox" name="size" id="large" />
          <span class="checkbox__span">large</span>
        </label>
      </div>
    </form>
  </div>
  </body>
</html>
