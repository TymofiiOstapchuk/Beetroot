<!DOCTYPE html>
<html>
  <head>
    <title>Buttons</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="container">
      <form action="test.html" method="POST" enctype="multipart/form-data">
        <p><input type="text" name="t1" value="" /></p>
        <p><input type="text" name="t2" value="" /></p>
        <p><textarea></textarea></p>

        <p>
          <b>Choose file</b>
          <input type="file" size="30" /><br />
        </p>

        <p>
          <input type="submit" name="btn1" value="submit button" />

        <p>
          <input type="button" name="btn2" value="button" />
        </p>

        <p>
          <input type="image" src="i/btn.png" name="btn3" />
        </p>

        <p>
          <input type="reset" name="btn4" value="reset" />
        </p>
      </form>
    </div>
  </body>
</html>
