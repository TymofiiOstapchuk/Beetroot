<!DOCTYPE html>
<html>
  <head>
    <title>3D Transform</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="css/style.css" />
    <style>
      body {
        perspective: 800px;
      }
      .wrap-3d {
        transition: all 1s;
        transform-style: preserve-3d;
      }
      .wrap-3d:hover {
        transform: rotateY(180deg);
      }
      .wrap-3d div {
        backface-visibility: hidden;
      }
      .box-b {
        transform: rotateY(-180deg);
      }
    </style>
  </head>
  <body>
    <div class="wrap-3d">
      <div class="box-a"></div>
      <div class="box-b"></div>
    </div>
  </body>
</html>
