<!DOCTYPE html>
<html>
  <head>
    <title>Transform</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="css/style.css" />
    <style>
      .box {
        transition: all 1s ease-in;
        transform: scale(0);
      }
      .wrap:hover .box {
        transform: scale(1.1) rotate(2turn);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="box box_transform">
        <img class="box__img" src="i/logo.png" />
      </div>
    </div>
  </body>
</html>
