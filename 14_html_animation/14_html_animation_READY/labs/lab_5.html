<!doctype html>
<html>
<head>
	<title>Lab 5</title>
	<meta charset="utf-8">
    <link rel="stylesheet" href="css/lab5.css">
</head>
<body>
	<div class="fade-container">
		<div class="fade1"></div>
		<div class="fade2"></div>
		<div class="fade3"></div>
	</div>
	<div class="mask"><h1>Beetroot</h1></div>

	<script
	src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"
	integrity="sha512-7eHRwcbYkK4d9g/6tD/mhkf++eoTHwpNM9woBxtPUBWm67zeAfFC+HrdoE2GanKeocly/VxeLvIqwvCdk7qScg=="
	crossorigin="anonymous"
	referrerpolicy="no-referrer"
  ></script>

  <script> 
	const t = gsap.timeline({
		defaults: {
			ease: "power4.inOut",
			duration: 0.5
		}
	});

	t.to([".fade1", '.fade2', '.fade3'], {
		scaleY:1,
		stagger: 0.2
	}).to ("h1", {
		x: 0,
		duration: 1,
		ease: "elactic.out(1, .5)"
	}, "-=.5")
	.to('.fade1', {
		scaleY :0
	})
	.to('.fade3', {
		scaleY: 0,
		transformOrigin: "bottom"
	}, "-=.5")
	.to("h1", {
		scale: 0.6
	})

  </script>
</body>
</html>
