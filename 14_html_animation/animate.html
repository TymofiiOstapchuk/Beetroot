<!DOCTYPE html>
<html>
  <head>
    <title>Animate</title>
    <meta charset="utf-8" />
    <style>
      /* #f5a8a8, #f08080 */

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #303030;
      }
      .container {
        width: 600px;
        background: #222;
        margin: 50px auto;
        padding: 5px;
        box-shadow: inset 0 0 1px rgba(0, 0, 0, 0.6),
          0 1px 0 rgba(255, 255, 255, 0.1);
      }
      .bar {
        height: 60px;
        border-radius: 5px;
        background: repeating-linear-gradient(
            -45deg,
            rgba(255, 255, 255, 0.1),
            rgba(255, 255, 255, 0) 12px
          ),
          linear-gradient(#f5a8a8, #f08080);
        animation: bar 3s linear;
      }

      @keyframes bar {
        0% {
          width: 0;
        }
        30%,
        60% {
          width: 30%;
        }
        90% {
          width: 10%;
        }
        100% {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="bar"></div>
    </div>
  </body>
</html>
