<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Flexbox Layout</title>
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css?family=Varela+Round"
      rel="stylesheet"
      type="text/css"
    />
    <link rel="stylesheet" href="css/page.css" />
    <style>
      .flex-container {
        display: flex;
        flex-wrap: wrap;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="flex-container">
        <div class="item-1 item">Item 1</div>
        <div class="item-2 item">Item 2</div>
        <div class="item-3 item">Item 3</div>
        <div class="item-4 item">Item 4</div>
        <div class="item-5 item">Item 5</div>
        <div class="item-6 item">Item 6</div>
        <div class="item-6 item">Item 8</div>
        <div class="item-6 item">Item 9</div>
        <div class="item-6 item">Item 10</div>
        <div class="item-6 item">Item 11</div>
        <div class="item-6 item">Item 12</div>
        <div class="item-6 item">Item 13</div>
        <div class="item-6 item">Item 14</div>
        <div class="item-6 item">Item 15</div>
        <div class="item-6 item">Item 16</div>
      </div>
    </div>
  </body>
</html>
