<!DOCTYPE html>
<html>
  <head>
    <title>Cascading CSS</title>
    <meta charset="utf-8" />
    <style>
      p {
        color: green !important;
      }
    </style>
  </head>
  <body>
    <div id="d1" class="outer">
      <p style="color: red" id="p1" class="inner">
        This is paragraph within div
      </p>
    </div>
  </body>
</html>
