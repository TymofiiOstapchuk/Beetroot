<html>
<head>
    <title>CSS</title>
    <meta charset="utf-8">
    <style>
		.container p:nth-of-type(2) {
			color: red;
		}
		li:only-of-type {
			color: green;
		}
	</style>
    </head>
<body>
<div class="container">
		<h1>Header H1</h1> 
		<p>Paragraph 1</p>
		<p>Paragraph 2</p>
	</section>
	<hr>

	<ul>
		<li>I'm all alone!</li>
	</ul>  
	<hr>
	<ul>
	  <p>I am a paragraph</p>
	  <!-- <p>I am a paragraph 2</p> -->
	  <li>We are together.</li>
	  <li>We are together.</li>
	  <li>We are together.</li>
	</ul> 




		
</body>
</html>
